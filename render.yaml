services:
  - type: web
    name: bandit-rain-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL
        sync: false
      - key: CF_CLEARANCE
        sync: false
      - key: CF_BM
        sync: false
      - key: USER_AGENT
        sync: false
